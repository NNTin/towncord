name: Sync PR Stack Labels

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - edited
      - synchronize
      - labeled
      - unlabeled
      - ready_for_review
      - converted_to_draft
      - closed

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: pr-dependencies-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-dependencies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Evaluate dependency state
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/pr-dependencies.mjs
