name: PR CI

on:
  pull_request:
    types:
      - opened
      - reopened
      - edited
      - synchronize
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Validate repo token
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          if [ -z "$REPO_TOKEN" ]; then
            echo "Error: REPO_TOKEN is not set. This workflow requires this secret to access private repositories." >&2
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.REPO_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Run automation tests
        run: npm run test:automation

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Aseprite CLI
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          set -euo pipefail
          RELEASE_TAG="v1.3.17"
          ASSET_NAME="Aseprite-v1.3.17-Linux.zip"
          EXPECTED_SHA256="6cf84e38dfc74bc0f20346d57f7158689823044759de620abe24321d2d7870e9"
          RELEASE_API_URL="https://api.github.com/repos/NNTin/aseprite-builder/releases/tags/${RELEASE_TAG}"
          ZIP_PATH="${RUNNER_TEMP}/aseprite.zip"
          INSTALL_DIR="${RUNNER_TEMP}/aseprite"

          ASSET_API_URL="$(
            curl -fsSL \
              -H "Authorization: Bearer ${REPO_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "$RELEASE_API_URL" | \
            python -c "import json,sys; asset='${ASSET_NAME}'; release=json.load(sys.stdin); print(next((a.get('url','') for a in release.get('assets',[]) if a.get('name')==asset), ''))"
          )"

          if [ -z "$ASSET_API_URL" ]; then
            echo "Error: Could not find asset '${ASSET_NAME}' in release '${RELEASE_TAG}'." >&2
            exit 1
          fi

          curl -fsSL \
            -H "Authorization: Bearer ${REPO_TOKEN}" \
            -H "Accept: application/octet-stream" \
            "$ASSET_API_URL" \
            -o "$ZIP_PATH"

          echo "${EXPECTED_SHA256}  ${ZIP_PATH}" | sha256sum -c -

          mkdir -p "$INSTALL_DIR"
          unzip -q "$ZIP_PATH" -d "$INSTALL_DIR"
          chmod +x "$INSTALL_DIR/aseprite"
          echo "$INSTALL_DIR" >> "$GITHUB_PATH"
          "$INSTALL_DIR/aseprite" --version

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow==10.3.0

      - name: Install dependencies
        run: npm ci

      - name: Find unused dependencies, exports, and files
        id: knip
        continue-on-error: true
        run: npm run knip

      - name: Find duplicated code
        id: jscpd
        continue-on-error: true
        run: npm run jscpd

      - name: Typecheck frontend
        id: typecheck
        continue-on-error: true
        run: npm run typecheck:frontend

      - name: Run frontend tests
        id: tests
        continue-on-error: true
        run: npm -w @towncord/frontend test

      - name: Build frontend
        id: build
        continue-on-error: true
        run: npm run build:frontend

      - name: Check all steps passed
        if: always()
        run: |
          failed=()
          [[ "${{ steps.knip.outcome }}"     == "failure" ]] && failed+=("knip")
          [[ "${{ steps.jscpd.outcome }}"    == "failure" ]] && failed+=("jscpd")
          [[ "${{ steps.typecheck.outcome }}" == "failure" ]] && failed+=("typecheck")
          [[ "${{ steps.tests.outcome }}"    == "failure" ]] && failed+=("tests")
          [[ "${{ steps.build.outcome }}"    == "failure" ]] && failed+=("build")
          if [[ ${#failed[@]} -gt 0 ]]; then
            echo "Failed steps: ${failed[*]}"
            exit 1
          fi
