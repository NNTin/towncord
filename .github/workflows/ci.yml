name: PR CI

on:
  pull_request:
    types:
      - opened
      - reopened
      - edited
      - synchronize
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      pull-requests: write

    steps:
      - name: Validate repo token
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          if [ -z "$REPO_TOKEN" ]; then
            echo "Error: REPO_TOKEN is not set. This workflow requires this secret to access private repositories." >&2
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.REPO_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Run automation tests
        run: npm run test:automation

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Aseprite CLI
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          set -euo pipefail
          RELEASE_TAG="v1.3.17"
          ASSET_NAME="Aseprite-v1.3.17-Linux.zip"
          EXPECTED_SHA256="6cf84e38dfc74bc0f20346d57f7158689823044759de620abe24321d2d7870e9"
          RELEASE_API_URL="https://api.github.com/repos/NNTin/aseprite-builder/releases/tags/${RELEASE_TAG}"
          ZIP_PATH="${RUNNER_TEMP}/aseprite.zip"
          INSTALL_DIR="${RUNNER_TEMP}/aseprite"

          ASSET_API_URL="$(
            curl -fsSL \
              -H "Authorization: Bearer ${REPO_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "$RELEASE_API_URL" | \
            python -c "import json,sys; asset='${ASSET_NAME}'; release=json.load(sys.stdin); print(next((a.get('url','') for a in release.get('assets',[]) if a.get('name')==asset), ''))"
          )"

          if [ -z "$ASSET_API_URL" ]; then
            echo "Error: Could not find asset '${ASSET_NAME}' in release '${RELEASE_TAG}'." >&2
            exit 1
          fi

          curl -fsSL \
            -H "Authorization: Bearer ${REPO_TOKEN}" \
            -H "Accept: application/octet-stream" \
            "$ASSET_API_URL" \
            -o "$ZIP_PATH"

          echo "${EXPECTED_SHA256}  ${ZIP_PATH}" | sha256sum -c -

          mkdir -p "$INSTALL_DIR"
          unzip -q "$ZIP_PATH" -d "$INSTALL_DIR"
          chmod +x "$INSTALL_DIR/aseprite"
          echo "$INSTALL_DIR" >> "$GITHUB_PATH"
          "$INSTALL_DIR/aseprite" --version

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow==10.3.0

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies for vulnerabilities
        id: audit
        continue-on-error: true
        shell: bash
        run: npm audit --audit-level=high 2>&1 | tee /tmp/audit.log; exit ${PIPESTATUS[0]}

      - name: Find unused dependencies, exports, and files
        id: knip
        continue-on-error: true
        shell: bash
        run: npm run knip 2>&1 | tee /tmp/knip.log; exit ${PIPESTATUS[0]}

      - name: Find duplicated code
        id: jscpd
        continue-on-error: true
        shell: bash
        run: npm run jscpd 2>&1 | tee /tmp/jscpd.log; exit ${PIPESTATUS[0]}

      - name: Build frontend
        id: build
        continue-on-error: true
        shell: bash
        run: npm run build:frontend 2>&1 | tee /tmp/build.log; exit ${PIPESTATUS[0]}

      - name: Typecheck frontend
        id: typecheck
        continue-on-error: true
        shell: bash
        run: npm run typecheck:frontend 2>&1 | tee /tmp/typecheck.log; exit ${PIPESTATUS[0]}

      - name: Run frontend tests
        id: tests
        continue-on-error: true
        shell: bash
        run: npm -w @towncord/frontend test 2>&1 | tee /tmp/tests.log; exit ${PIPESTATUS[0]}

      - name: Check all steps passed
        if: always()
        run: |
          failed=()
          [[ "${{ steps.audit.outcome }}"     != "success" ]] && failed+=("audit")
          [[ "${{ steps.typecheck.outcome }}" != "success" ]] && failed+=("typecheck")
          [[ "${{ steps.tests.outcome }}"     != "success" ]] && failed+=("tests")
          [[ "${{ steps.build.outcome }}"     != "success" ]] && failed+=("build")
          if [[ ${#failed[@]} -gt 0 ]]; then
            echo "Failed steps: ${failed[*]}"
            exit 1
          fi

      - name: Post CI report
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUDIT_OUTCOME: ${{ steps.audit.outcome }}
          KNIP_OUTCOME: ${{ steps.knip.outcome }}
          JSCPD_OUTCOME: ${{ steps.jscpd.outcome }}
          TYPECHECK_OUTCOME: ${{ steps.typecheck.outcome }}
          TESTS_OUTCOME: ${{ steps.tests.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: python3 .github/scripts/post_ci_report.py
