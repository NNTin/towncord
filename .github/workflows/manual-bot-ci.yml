name: Manual Bot PR CI

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number created by copilot-swe-agent[bot]
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-pr-${{ inputs.pr_number }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Validate bot PR input
        id: pr
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
        with:
          script: |
            const allowedAuthors = new Set([
              "Copilot",
              "copilot-swe-agent",
              "copilot-swe-agent[bot]",
            ]);
            const prNumber = Number(process.env.PR_NUMBER);
            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              core.setFailed(`Invalid pull request number: ${process.env.PR_NUMBER}`);
              return;
            }

            const { owner, repo } = context.repo;
            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });

            if (!allowedAuthors.has(pr.user.login)) {
              core.setFailed(
                `PR #${prNumber} is authored by ${pr.user.login}, not Copilot / copilot-swe-agent.`,
              );
              return;
            }

            if (pr.state !== "open") {
              core.setFailed(`PR #${prNumber} is not open.`);
              return;
            }

            core.setOutput("merge_ref", `refs/pull/${prNumber}/merge`);

      - name: Validate repo token
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          if [ -z "$REPO_TOKEN" ]; then
            echo "Error: REPO_TOKEN is not set. This workflow requires this secret to access private repositories." >&2
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.merge_ref }}
          submodules: recursive
          token: ${{ secrets.REPO_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Aseprite CLI
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          set -euo pipefail
          RELEASE_TAG="v1.3.17"
          ASSET_NAME="Aseprite-v1.3.17-Linux.zip"
          EXPECTED_SHA256="6cf84e38dfc74bc0f20346d57f7158689823044759de620abe24321d2d7870e9"
          RELEASE_API_URL="https://api.github.com/repos/NNTin/aseprite-builder/releases/tags/${RELEASE_TAG}"
          ZIP_PATH="${RUNNER_TEMP}/aseprite.zip"
          INSTALL_DIR="${RUNNER_TEMP}/aseprite"

          ASSET_API_URL="$(
            curl -fsSL \
              -H "Authorization: Bearer ${REPO_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "$RELEASE_API_URL" | \
            python -c "import json,sys; asset='${ASSET_NAME}'; release=json.load(sys.stdin); print(next((a.get('url','') for a in release.get('assets',[]) if a.get('name')==asset), ''))"
          )"

          if [ -z "$ASSET_API_URL" ]; then
            echo "Error: Could not find asset '${ASSET_NAME}' in release '${RELEASE_TAG}'." >&2
            exit 1
          fi

          curl -fsSL \
            -H "Authorization: Bearer ${REPO_TOKEN}" \
            -H "Accept: application/octet-stream" \
            "$ASSET_API_URL" \
            -o "$ZIP_PATH"

          echo "${EXPECTED_SHA256}  ${ZIP_PATH}" | sha256sum -c -

          mkdir -p "$INSTALL_DIR"
          unzip -q "$ZIP_PATH" -d "$INSTALL_DIR"
          chmod +x "$INSTALL_DIR/aseprite"
          echo "$INSTALL_DIR" >> "$GITHUB_PATH"
          "$INSTALL_DIR/aseprite" --version

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow==10.3.0

      - name: Install dependencies
        run: npm ci

      - name: Typecheck frontend
        run: npm run typecheck:frontend

      - name: Run frontend tests
        run: npm -w @towncord/frontend test

      - name: Build frontend
        run: npm run build:frontend
