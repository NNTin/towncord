name: Versioned GitHub Pages Deployment

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g. v0.3.0)'
        required: true

permissions:
  contents: write

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Determine version
        id: version
        run: |
          RAW="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}"
          VERSION="${RAW#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs: resolve-version

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.BLOOMSEED_ASSETS_REPO_TOKEN != '' && secrets.BLOOMSEED_ASSETS_REPO_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Aseprite CLI
        uses: neomura/setup-aseprite-cli-action@1fb5457640e86f885546a55870f55f0d62dce630

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        run: npm run build:frontend
        env:
          BASE_PATH: /towncord/${{ needs.resolve-version.outputs.version }}/

      - name: Prepare deployment
        run: bash .github/scripts/deploy.sh "${{ needs.resolve-version.outputs.version }}"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          keep_files: true
