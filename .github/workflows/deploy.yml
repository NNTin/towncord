name: Versioned GitHub Pages Deployment

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g. v0.3.0)'
        required: true

permissions:
  contents: write

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Determine version
        id: version
        run: |
          RAW="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}"
          VERSION="${RAW#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs: resolve-version

    steps:
      - name: Validate repo token
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          if [ -z "$REPO_TOKEN" ]; then
            echo "Error: REPO_TOKEN is not set. This workflow requires this secret to access private repositories." >&2
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.REPO_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Aseprite CLI
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          set -euo pipefail
          RELEASE_TAG="v1.3.17"
          ASSET_NAME="Aseprite-v1.3.17-Linux.zip"
          EXPECTED_SHA256="6cf84e38dfc74bc0f20346d57f7158689823044759de620abe24321d2d7870e9"
          RELEASE_API_URL="https://api.github.com/repos/NNTin/aseprite-builder/releases/tags/${RELEASE_TAG}"
          ZIP_PATH="${RUNNER_TEMP}/aseprite.zip"
          INSTALL_DIR="${RUNNER_TEMP}/aseprite"

          ASSET_API_URL="$(
            curl -fsSL \
              -H "Authorization: Bearer ${REPO_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "$RELEASE_API_URL" | \
            python -c "import json,sys; asset='${ASSET_NAME}'; release=json.load(sys.stdin); print(next((a.get('url','') for a in release.get('assets',[]) if a.get('name')==asset), ''))"
          )"

          if [ -z "$ASSET_API_URL" ]; then
            echo "Error: Could not find asset '${ASSET_NAME}' in release '${RELEASE_TAG}'." >&2
            exit 1
          fi

          curl -fsSL \
            -H "Authorization: Bearer ${REPO_TOKEN}" \
            -H "Accept: application/octet-stream" \
            "$ASSET_API_URL" \
            -o "$ZIP_PATH"

          echo "${EXPECTED_SHA256}  ${ZIP_PATH}" | sha256sum -c -

          mkdir -p "$INSTALL_DIR"
          unzip -q "$ZIP_PATH" -d "$INSTALL_DIR"
          chmod +x "$INSTALL_DIR/aseprite"
          echo "$INSTALL_DIR" >> "$GITHUB_PATH"
          "$INSTALL_DIR/aseprite" --version

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow==10.3.0

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        run: npm run build:frontend
        env:
          BASE_PATH: /towncord/${{ needs.resolve-version.outputs.version }}/

      - name: Prepare deployment
        run: bash .github/scripts/deploy.sh "${{ needs.resolve-version.outputs.version }}"

      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Generate SBOM
        run: trivy fs . --format cyclonedx --output sbom.cdx.json --exit-code 0

      - name: Attach SBOM to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && format('v{0}', needs.resolve-version.outputs.version) || github.ref_name }}"
          gh release upload "$TAG" sbom.cdx.json --clobber

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          keep_files: true
