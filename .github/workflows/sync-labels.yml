name: Sync Labels

on:
  push:
    branches:
      - main
    paths:
      - .github/labels.json
      - .github/scripts/sync-labels.mjs
      - .github/workflows/sync-labels.yml
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  sync-labels:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync configured labels
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/sync-labels.mjs
