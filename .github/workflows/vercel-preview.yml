name: Vercel Preview Deployment

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: vercel-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    environment: Preview
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.REPO_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Aseprite CLI
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          set -euo pipefail
          RELEASE_TAG="v1.3.17"
          ASSET_NAME="Aseprite-v1.3.17-Linux.zip"
          EXPECTED_SHA256="6cf84e38dfc74bc0f20346d57f7158689823044759de620abe24321d2d7870e9"
          RELEASE_API_URL="https://api.github.com/repos/NNTin/aseprite-builder/releases/tags/${RELEASE_TAG}"
          ZIP_PATH="${RUNNER_TEMP}/aseprite.zip"
          INSTALL_DIR="${RUNNER_TEMP}/aseprite"

          ASSET_API_URL="$(
            curl -fsSL \
              -H "Authorization: Bearer ${REPO_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "$RELEASE_API_URL" | \
            python -c "import json,sys; asset='${ASSET_NAME}'; release=json.load(sys.stdin); print(next((a.get('url','') for a in release.get('assets',[]) if a.get('name')==asset), ''))"
          )"

          if [ -z "$ASSET_API_URL" ]; then
            echo "Error: Could not find asset '${ASSET_NAME}' in release '${RELEASE_TAG}'." >&2
            exit 1
          fi

          curl -fsSL \
            -H "Authorization: Bearer ${REPO_TOKEN}" \
            -H "Accept: application/octet-stream" \
            "$ASSET_API_URL" \
            -o "$ZIP_PATH"

          echo "${EXPECTED_SHA256}  ${ZIP_PATH}" | sha256sum -c -

          mkdir -p "$INSTALL_DIR"
          unzip -q "$ZIP_PATH" -d "$INSTALL_DIR"
          chmod +x "$INSTALL_DIR/aseprite"
          echo "$INSTALL_DIR" >> "$GITHUB_PATH"
          "$INSTALL_DIR/aseprite" --version

      - name: Install Python dependencies
        run: python -m pip install pillow==10.3.0

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx vercel build --token ${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          URL=$(npx vercel deploy --prebuilt --token ${{ secrets.VERCEL_TOKEN }} --yes)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment preview URL on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "🔍 Vercel Preview: ${{ steps.deploy.outputs.url }}"
